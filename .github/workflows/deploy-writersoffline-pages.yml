name: Deploy Writers Offline to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - ".github/workflows/deploy-writersoffline-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: writersoffline-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish static site to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          clean: true
          single-commit: true
