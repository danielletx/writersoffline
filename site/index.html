    const canvas=document.getElementById('ambient'),ctx=canvas.getContext('2d');let w=0,hgt=0,start=performance.now();const colors=['#f2c697','#bf4f37','#7297a1','#a6ba62'];function size(){const r=Math.min(devicePixelRatio||1,2);w=innerWidth;hgt=innerHeight;canvas.width=w*r;canvas.height=hgt*r;ctx.setTransform(r,0,0,r,0,0)}function rgba(hex,a){const m=hex.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16));return`rgba(${m[0]},${m[1]},${m[2]},${a})`}function draw(now){const t=(now-start)/1000;ctx.clearRect(0,0,w,hgt);ctx.fillStyle='#050507';ctx.fillRect(0,0,w,hgt);ctx.globalCompositeOperation='screen';colors.forEach((c,i)=>{ctx.beginPath();for(let s=0;s<=70;s++){const x=w*s/70,y=hgt*(.16+i*.17)+Math.sin(t*(.3+i*.04)+s*.11+i)*hgt*.05+(Math.cos(t*.25+s*.08)*hgt*.012);s?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.strokeStyle=rgba(c,.12);ctx.lineWidth=1.2;ctx.stroke()});for(let i=0;i<70;i++){const c=colors[i%colors.length],x=w*((i*37)%100)/100+Math.sin(t*.3+i)*22,y=hgt*((i*61)%100)/100+Math.cos(t*.22+i)*18;ctx.fillStyle=rgba(c,.1+(Math.sin(t+i)+1)*.07);ctx.beginPath();ctx.arc(x,y,.6+(i%5)*.3,0,Math.PI*2);ctx.fill()}requestAnimationFrame(draw)}size();addEventListener('resize',size);requestAnimationFrame(draw);
